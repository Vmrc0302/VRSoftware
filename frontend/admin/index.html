<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | VRSoftware</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <header>

        <div class="header-info">

            <h1>VRSoftware Dashboard</h1>

            <h3 id="usuarioActivo"></h3>

        </div>

        <button id="logoutBtn" class="logout-btn">

            <i class="fas fa-right-from-bracket"></i>

            Cerrar sesión

        </button>

    </header>

    <main>

        <section class="cards">

            <div class="card">

                <i class="fas fa-users"></i>

                <h2 id="totalContactos">0</h2>

                <span>Contactos</span>

            </div>

        </section>

        <section class="busqueda">

            <input
                type="text"
                id="buscar"
                placeholder="🔍 Buscar por nombre, correo o empresa..."
            >

        </section>

        <section class="tabla">

            <table>

                <thead>

                    <tr>

                        <th>Nombre</th>

                        <th>Correo</th>

                        <th>Empresa</th>

                        <th>Mensaje</th>

                        <th>Fecha</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tablaContactos">

                </tbody>

            </table>

        </section>

    </main>

    <script src="app.js"></script>

</body>

</html>
