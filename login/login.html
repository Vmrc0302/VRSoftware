<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | VRSoftware</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="login-card">

        <h1>VRSoftware</h1>

        <p>Panel de Administración</p>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Contraseña"
                required
            >

            <button type="submit">

                Iniciar sesión

            </button>

        </form>

        <p id="mensaje"></p>

    </div>

    <script src="login.js"></script>

</body>
</html>
